<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareMind</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Social Worker Assistant</h1>

      <section id="client-form-section">
        <h2>Client Information</h2>
        <form id="client-form">
          <div class="form-group">
            <input type="text" id="client-name" placeholder="Name" required />
            <input
              type="text"
              id="client-surname"
              placeholder="Surname"
              required
            />
          </div>
          <div class="form-group">
            <input type="number" id="client-age" placeholder="Age" required />
            <input
              type="text"
              id="client-location"
              placeholder="Location (e.g. Rosebank)"
              required
            />
          </div>
          <textarea
            id="client-issue"
            placeholder="Describe the primary issue..."
            required
          ></textarea>
        </form>
      </section>

      <div id="saved-client-info" class="hidden">
        <h3>💾 Last Saved Session</h3>
        <div class="info-grid">
          <p><strong>Database ID:</strong> <span id="db-id">-</span></p>
          <p><strong>Full Name:</strong> <span id="db-name">-</span></p>
          <p><strong>Location:</strong> <span id="db-location">-</span></p>
          <p><strong>Age:</strong> <span id="db-age">-</span></p>
        </div>
      </div>

      <div class="message-section">
        <h2>Send Message to AI</h2>
        <textarea
          id="user-message"
          placeholder="Enter your message to the AI assistant..."
        ></textarea>
        <button id="send-button">Send to AI</button>
      </div>

      <div class="response-section">
        <h2>AI Response</h2>
        <div id="ai-response">
          <!-- AI response will appear here -->
          <p>No response yet. Send a message to get started.</p>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
